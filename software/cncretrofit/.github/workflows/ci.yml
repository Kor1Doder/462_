name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# the design notes: Tier-1 (unit) tests must pass on both Windows and Linux from M0.
# Tier-2 (integration) tests join the matrix once tools/grblhal_sim lands (M7).
jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy (strict)
        run: uv run mypy --strict src/cncctl tools/grblhal_sim

      - name: Pytest (unit)
        run: uv run pytest tests/unit -ra

      - name: Pytest (integration — in-memory grblHAL simulator)
        run: uv run pytest tests/integration -ra
